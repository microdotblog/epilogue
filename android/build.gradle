buildscript {
    def resolveNodeExecutable = {
        def configuredNode = System.getenv("NODE_BINARY")

        if (configuredNode) {
            return configuredNode
        }

        def commonNodeLocations = [
            "/opt/homebrew/bin/node",
            "/usr/local/bin/node"
        ]

        return commonNodeLocations.find { file(it).exists() } ?: "node"
    }

    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
        androidXBrowser = "1.8.0"
        nodeExecutable = resolveNodeExecutable()
        REACT_NATIVE_NODE_MODULES_DIR = file("$rootDir/../node_modules/react-native").absolutePath
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.github.triplet.gradle:play-publisher:3.10.1")
    }
}

apply plugin: "com.facebook.react.rootproject"
apply plugin: "expo-root-project"
